# Local PostgreSQL for HENRY (matches production on Azure).
# Usage: docker compose up -d
# Then in backend/.env set DATABASE_URL=postgresql://henry:henry@localhost:5432/henry?schema=public

services:
  postgres:
    image: postgres:16-alpine
    container_name: henry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: henry
      POSTGRES_PASSWORD: henry
      POSTGRES_DB: henry
    ports:
      - '5432:5432'
    volumes:
      - henry_pgdata:/var/lib/postgresql/data

volumes:
  henry_pgdata:
